<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden - Aufnahmen Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .login-header {
            margin-bottom: 32px;
        }
        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #7289da);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .discord-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .discord-btn:hover {
            background: #4752C4;
        }
        .discord-btn svg {
            margin-right: 10px;
        }
        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 16px;
            display: none;
        }
        .error-msg.visible {
            display: block;
        }
        .hint {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Aufnahmen Portal</h1>
                <p>Mit Discord anmelden</p>
            </div>

            <a href="/api/auth/discord" id="discord-btn" class="discord-btn">
                <svg width="22" height="22" viewBox="0 0 127.14 96.36" fill="currentColor"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
                Mit Discord anmelden
            </a>

            <p class="error-msg" id="error-msg">Discord Auth ist nicht verfügbar. Wende dich an den Administrator.</p>

            <p class="hint">Nur für Mitglieder mit Administrator-Rechten auf dem Discord Server.</p>
        </div>
    </div>

    <script>
        // Prüfen ob Discord Auth verfügbar ist
        fetch('/api/auth/status')
            .then(r => r.json())
            .then(data => {
                const btn = document.getElementById('discord-btn');
                const err = document.getElementById('error-msg');
                if (data.available) {
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                    err.classList.add('visible');
                }
            })
            .catch(() => {
                document.getElementById('discord-btn').style.display = 'flex';
            });
    </script>
</body>
</html>
