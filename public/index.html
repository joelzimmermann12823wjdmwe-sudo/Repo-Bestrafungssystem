<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aufnahmen - Download Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-content">
                <h1>Aufnahmen Portal</h1>
                <div class="header-right">
                    <div class="status-bar">
                        <span id="bot-status" class="status-badge offline">Bot offline</span>
                        <span id="active-recordings" class="status-badge">0 aktiv</span>
                    </div>
                    <span id="user-display" class="user-display"></span>
                    <button id="logout-btn" class="logout-btn" title="Abmelden">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="main">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Lade Aufnahmen...</p>
            </div>

            <div id="recordings-list" class="recordings-list hidden"></div>

            <div id="empty-state" class="empty-state hidden">
                <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="22"/>
                </svg>
                <h2>Keine Aufnahmen vorhanden</h2>
                <p>Sobald Voice-Aufnahmen erstellt werden, erscheinen sie hier.</p>
            </div>
        </main>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Dateien</h2>
                <button id="modal-close" class="modal-close" aria-label="Schlie&szlig;en">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
