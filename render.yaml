services:
  - type: web
    name: bestrafungssystem-bot
    runtime: node
    buildCommand: npm install
    startCommand: node src/bot.js
    healthCheckPath: /health
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: GUILD_ID
        sync: false
      - key: PUNISHMENT_ROLE_ID
        sync: false
      - key: ADMIN_ROLE_IDS
        sync: false
      - key: WEB_HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: MAX_RECORDINGS
        value: 10
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
    disk:
      name: punishment-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
